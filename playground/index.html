<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work1 Chat Widget Playground</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      font-family: system-ui, sans-serif;
    }
    .playground-layout {
      display: flex;
      height: 100vh;
    }
    .playground-sidebar {
      width: 320px;
      flex-shrink: 0;
      overflow-y: auto;
      border-right: 1px solid #e5e5e5;
      background: #fafafa;
    }
    .sidebar-title {
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border-bottom: 1px solid #e5e5e5;
      color: #333;
    }
    .playground-main {
      flex: 1;
      position: relative;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="playground-layout">
    <aside class="playground-sidebar">
      <h2 class="sidebar-title">Widget Playground</h2>
      <playground-controls></playground-controls>
    </aside>
    <main class="playground-main">
      <work1-chat-widget></work1-chat-widget>
    </main>
  </div>
  <script type="module">
    import '../src/index.ts';
    import { MockWebSocket } from './mock-ws.ts';
    import './controls.ts';

    const widget = document.querySelector('work1-chat-widget');
    widget.setAttribute('server-url', 'ws://mock');
    widget.setAttribute('debug', '');
    widget._wsConstructor = MockWebSocket;

    // Wire controls to widget
    const controls = document.querySelector('playground-controls');
    controls.widgetEl = widget;
    controls.setupWidgetListeners();

    // Keep global for console access
    window.MockWebSocket = MockWebSocket;
  </script>
</body>
</html>
